<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Assistant</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:'Poppins',sans-serif;

    height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    overflow:hidden;

    background:
    linear-gradient(
        135deg,
        #050505,
        #140a0a,
        #1f0b14,
        #2a0c0c
    );
}

/* BACKGROUND GLOW */

body::before{

    content:"";

    position:absolute;

    width:450px;

    height:450px;

    background:#ff4d8d;

    border-radius:50%;

    filter:blur(120px);

    top:-120px;

    left:-120px;

    opacity:0.22;
}

body::after{

    content:"";

    position:absolute;

    width:400px;

    height:400px;

    background:#ff7b00;

    border-radius:50%;

    filter:blur(120px);

    bottom:-100px;

    right:-100px;

    opacity:0.18;
}

/* MAIN CONTAINER */

.container{

    width:1000px;

    height:88vh;

    background:rgba(10,10,10,0.72);

    backdrop-filter:blur(16px);

    border-radius:28px;

    overflow:hidden;

    display:flex;

    flex-direction:column;

    position:relative;

    z-index:10;

    border:1px solid rgba(255,255,255,0.05);

    box-shadow:
    0 10px 40px rgba(0,0,0,0.45);
}

/* HEADER */

.header{

    height:85px;

    display:flex;

    align-items:center;

    padding:0 28px;

    gap:15px;

    border-bottom:1px solid rgba(255,255,255,0.05);

    background:rgba(255,255,255,0.02);
}

.logo{

    width:50px;

    height:50px;

    border-radius:16px;

    background:
    linear-gradient(
        135deg,
        #ff4d8d,
        #ff7b00
    );

    display:flex;

    justify-content:center;

    align-items:center;

    color:white;

    font-size:20px;

    font-weight:bold;

    box-shadow:
    0 0 25px rgba(255,77,141,0.35);
}

.header h1{

    color:white;

    font-size:28px;

    font-weight:600;
}

/* CHAT AREA */

.chat-box{

    flex:1;

    overflow-y:auto;

    padding:28px;

    display:flex;

    flex-direction:column;

    gap:18px;

    scroll-behavior:smooth;
}

/* SMOOTH SCROLLBAR */

.chat-box::-webkit-scrollbar{

    width:7px;
}

.chat-box::-webkit-scrollbar-track{

    background:transparent;
}

.chat-box::-webkit-scrollbar-thumb{

    background:
    linear-gradient(
        180deg,
        #ff4d8d,
        #ff7b00
    );

    border-radius:20px;
}

/* MESSAGE */

.message{

    max-width:70%;

    padding:16px 20px;

    border-radius:22px;

    line-height:1.8;

    animation:smoothFade 0.3s ease;

    word-break:break-word;

    font-size:15px;

    transition:0.2s;

    position:relative;
}

.message:hover{

    transform:translateY(-2px);
}

/* USER MESSAGE */

.user{

    align-self:flex-end;

    background:
    linear-gradient(
        135deg,
        #ff4d8d,
        #ff7b00
    );

    color:white;

    border-bottom-right-radius:6px;

    box-shadow:
    0 4px 18px rgba(255,77,141,0.25);
}

/* AI MESSAGE */

.ai{

    align-self:flex-start;

    background:rgba(255,255,255,0.06);

    color:#ffffff;

    border:1px solid rgba(255,255,255,0.05);

    border-bottom-left-radius:6px;

    backdrop-filter:blur(10px);

    box-shadow:
    0 4px 18px rgba(0,0,0,0.15);
}

/* INPUT AREA */

.input-area{

    padding:20px;

    display:flex;

    gap:15px;

    border-top:1px solid rgba(255,255,255,0.05);

    background:rgba(255,255,255,0.02);
}

input{

    flex:1;

    padding:18px 22px;

    border:none;

    outline:none;

    border-radius:18px;

    background:rgba(255,255,255,0.06);

    color:white;

    font-size:16px;
}

input::placeholder{

    color:#d1d5db;
}

/* BUTTON */

button{

    padding:18px 28px;

    border:none;

    border-radius:18px;

    background:
    linear-gradient(
        135deg,
        #ff4d8d,
        #ff7b00
    );

    color:white;

    font-size:16px;

    font-weight:600;

    cursor:pointer;

    transition:0.25s;

    box-shadow:
    0 4px 18px rgba(255,77,141,0.25);
}

button:hover{

    transform:
    translateY(-2px)
    scale(1.03);
}

/* TYPING EFFECT */

.typing{

    display:flex;

    gap:6px;

    padding:14px 18px;

    width:fit-content;

    border-radius:15px;

    background:rgba(255,255,255,0.05);
}

.dot{

    width:9px;

    height:9px;

    border-radius:50%;

    background:white;

    animation:bounce 1.1s infinite;
}

.dot:nth-child(2){

    animation-delay:0.2s;
}

.dot:nth-child(3){

    animation-delay:0.4s;
}

/* ANIMATIONS */

@keyframes smoothFade{

    from{

        opacity:0;

        transform:
        translateY(8px);
    }

    to{

        opacity:1;

        transform:
        translateY(0);
    }
}

@keyframes bounce{

    0%,100%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-5px);
    }
}

</style>

</head>

<body>

<div class="container">

    <div class="header">

        <div class="logo">
            AI
        </div>

        <h1>AI Assistant</h1>

    </div>

    <div class="chat-box" id="chatBox">

        <div class="message ai">
            👋 Hello! I am your AI Assistant. Ask me anything.
        </div>

    </div>

    <div class="input-area">

        <input
            type="text"
            id="message"
            placeholder="Type your message..."
        >

        <button onclick="sendMessage()">
            Send
        </button>

    </div>

</div>

<script>

async function sendMessage(){

    let input = document.getElementById("message");

    let message = input.value.trim();

    if(message === ""){
        return;
    }

    let chatBox = document.getElementById("chatBox");

    // USER MESSAGE

    chatBox.innerHTML += `
        <div class="message user">
            ${message}
        </div>
    `;

    input.value = "";

    // TYPING ANIMATION

    let typingId = "typing-" + Date.now();

    chatBox.innerHTML += `
        <div class="typing" id="${typingId}">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    `;

    chatBox.scrollTop = chatBox.scrollHeight;

    try{

        let response = await fetch(
            `/chat?message=${encodeURIComponent(message)}`
        );

        let data = await response.text();

        document.getElementById(typingId).remove();

        // AI RESPONSE

        chatBox.innerHTML += `
            <div class="message ai">
                ${formatResponse(data)}
            </div>
        `;

        chatBox.scrollTop = chatBox.scrollHeight;
    }

    catch(error){

        document.getElementById(typingId).remove();

        chatBox.innerHTML += `
            <div class="message ai">
                Error connecting to AI server.
            </div>
        `;
    }
}

function formatResponse(text){

    return text
        .replace(/\*\*(.*?)\*\*/g,"<b>$1</b>")
        .replace(/\n/g,"<br>");
}

/* ENTER KEY SUPPORT */

document.getElementById("message")
.addEventListener("keypress", function(event){

    if(event.key === "Enter"){

        sendMessage();
    }
});

</script>

</body>

</html>
